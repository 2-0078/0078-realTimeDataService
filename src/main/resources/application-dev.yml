spring:
  datasource:
    url: jdbc:mysql://${EC2_DB}:3306/piece_of_cake
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  kafka:
    bootstrap-servers: ${EC2_HOST2}:10000,${EC2_HOST2}:10001,${EC2_HOST2}:10002
    producer:
      key-deserializer: org.apache.kafka.common.serialization.StringSerializer
      value-deserializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432

kis:
  app-key: ${APP_KEY}
  app-secret-key: ${APP_SECRET_KEY}
  real-app-key: ${REAL_APP_KEY}
  real-app-secret-key: ${REAL_APP_SECRET_KEY}
  api:
    approval-key: ${API_APPROVAL_KEY}
  websocket:
    approval-key: ${SOCKET_APPROVAL_KEY}
    real-approval-key: ${REAL_WEBSOCKET_APPROVAL_KEY}

eureka:
  client:
    service-url:
      defaultZone: http://${EC2_HOST:localhost}:8761/eureka/